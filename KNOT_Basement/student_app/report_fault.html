<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Report a Fault - KNOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2d7dd2",
                        "secondary": "#34a853",
                        "background-light": "#ffffff",
                        "background-dark": "#121920",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #fafafa;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #2d7dd2;
            box-shadow: 0 0 0 1px #2d7dd2;
        }
    </style>
</head>

<body class="text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center w-full">
    <!-- Auth Guard -->
    <script>
        if (!localStorage.getItem('knot_user')) {
            window.location.href = 'login.html';
        }
    </script>
    <div class="max-w-5xl w-full bg-white min-h-screen shadow-xl flex flex-col">
        <!-- Header -->
        <header class="flex items-center justify-between p-4 border-b border-slate-100 sticky top-0 bg-white z-10">
            <div class="flex items-center gap-2">
                <button class="p-2 -ml-2 text-primary hover:bg-slate-50 rounded-full" onclick="window.history.back()">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>
                <img src="knot_logo_cropped.png" alt="KNOT Logo" class="h-10 md:h-12 object-contain" />
            </div>
            <div class="flex-1 ml-4">
                <h1 class="text-xl font-bold tracking-tight">Report a Fault</h1>
            </div>
            <button class="w-8 h-8 bg-slate-100 text-primary rounded-full flex items-center justify-center font-bold">
                ?
            </button>
        </header>

        <main class="flex-1 p-5 space-y-8 overflow-y-auto">

            <!-- Location Details -->
            <section>
                <div class="flex items-center gap-2 mb-4">
                    <span class="material-symbols-outlined text-primary text-xl font-variation-fill">location_on</span>
                    <h2 class="text-lg font-bold">Location Details</h2>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold mb-2">Building</label>
                        <div class="relative">
                            <select
                                class="w-full border border-slate-300 rounded-lg p-3 appearance-none bg-white font-medium text-slate-700">
                                <option disabled selected>Select Building</option>
                                <option>Engineering Old Block (EOE)</option>
                                <option>Drawing Office 1 (DO1)</option>
                                <option>Science Labs</option>
                            </select>
                            <span
                                class="material-symbols-outlined absolute right-3 top-3 text-slate-400 pointer-events-none">expand_more</span>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-2">Room / Area</label>
                        <input type="text" placeholder="e.g. Room 302 or Hallway"
                            class="w-full border border-slate-300 rounded-lg p-3 text-slate-700 placeholder:text-slate-400" />
                    </div>
                </div>
            </section>

            <!-- Issue Description -->
            <section>
                <div class="flex items-center gap-2 mb-4">
                    <span class="material-symbols-outlined text-primary text-xl font-variation-fill">error</span>
                    <h2 class="text-lg font-bold">Issue Description</h2>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2">What's wrong?</label>
                    <textarea placeholder="Please provide as much detail as possible about the fault..."
                        class="w-full border border-slate-300 rounded-lg p-3 h-32 resize-none text-slate-700 placeholder:text-slate-400"></textarea>
                </div>
            </section>

            <!-- Priority Level -->
            <section>
                <div class="flex items-center gap-2 mb-4">
                    <span class="material-symbols-outlined text-primary text-xl font-bold">priority_high</span>
                    <h2 class="text-lg font-bold">Priority Level</h2>
                </div>

                <div class="grid grid-cols-3 gap-3">
                    <button type="button"
                        class="priority-btn border border-slate-200 rounded-lg p-3 flex flex-col items-center justify-center gap-1 hover:border-primary/50 transition-colors"
                        onclick="setPriority('Low', this)">
                        <span class="font-bold text-sm">Low</span>
                        <span
                            class="text-[10px] text-slate-400 font-semibold uppercase tracking-wider">Non-Urgent</span>
                    </button>
                    <button type="button"
                        class="priority-btn border-2 border-primary rounded-lg p-3 flex flex-col items-center justify-center gap-1 bg-primary/5"
                        onclick="setPriority('Medium', this)">
                        <span class="font-bold text-sm text-primary">Medium</span>
                        <span class="text-[10px] text-primary/70 font-semibold uppercase tracking-wider">Routine</span>
                    </button>
                    <button type="button"
                        class="priority-btn border border-slate-200 rounded-lg p-3 flex flex-col items-center justify-center gap-1 hover:border-primary/50 transition-colors"
                        onclick="setPriority('High', this)">
                        <span class="font-bold text-sm">High</span>
                        <span class="text-[10px] text-slate-400 font-semibold uppercase tracking-wider">Urgent</span>
                    </button>
                </div>
            </section>

            <!-- Evidence -->
            <section>
                <div class="flex items-center gap-2 mb-4">
                    <span class="material-symbols-outlined text-primary text-xl font-variation-fill">photo_camera</span>
                    <h2 class="text-lg font-bold flex items-center gap-2">Evidence <span
                            class="text-sm font-normal text-slate-500">(Optional)</span></h2>
                </div>

                <div
                    class="border-2 border-dashed border-slate-300 rounded-xl p-8 flex flex-col items-center justify-center text-center bg-slate-50/50 hover:bg-slate-50 transition-colors cursor-pointer group">
                    <div
                        class="w-12 h-12 bg-slate-200 rounded-full flex items-center justify-center mb-4 group-hover:bg-slate-300 transition-colors">
                        <span class="material-symbols-outlined text-slate-600 font-variation-fill">cloud_upload</span>
                    </div>
                    <p class="font-semibold text-sm mb-1">Click to upload or drag and drop</p>
                    <p class="text-xs text-slate-500">PNG, JPG or JPEG up to 10MB</p>
                </div>
            </section>

            <div class="h-6"></div> <!-- spacer -->
        </main>

        <!-- Bottom Action -->
        <div class="p-4 bg-slate-50 border-t border-slate-100 flex flex-col gap-4">
            <button
                class="w-full bg-primary text-white py-4 rounded-xl font-bold text-lg flex items-center justify-center gap-2 hover:bg-primary/90 transition-colors shadow-lg shadow-primary/20"
                onclick="submitFault()">
                Submit Report <span class="material-symbols-outlined font-variation-fill">send</span>
            </button>
            <p class="text-[10px] font-bold tracking-wider text-slate-400 uppercase text-center mb-2">Knot Campus
                Management &copy; 2024</p>
        </div>
    </div>
    <script>
        let currentPriority = 'Medium';

        function setPriority(level, btnElement) {
            currentPriority = level;
            
            // Reset all buttons
            const buttons = document.querySelectorAll('.priority-btn');
            buttons.forEach(btn => {
                btn.className = 'priority-btn border border-slate-200 rounded-lg p-3 flex flex-col items-center justify-center gap-1 hover:border-primary/50 transition-colors';
                btn.querySelector('span:first-child').className = 'font-bold text-sm';
                btn.querySelector('span:last-child').className = 'text-[10px] text-slate-400 font-semibold uppercase tracking-wider';
            });

            // Set active button
            btnElement.className = 'priority-btn border-2 border-primary rounded-lg p-3 flex flex-col items-center justify-center gap-1 bg-primary/5';
            btnElement.querySelector('span:first-child').className = 'font-bold text-sm text-primary';
            btnElement.querySelector('span:last-child').className = 'text-[10px] text-primary/70 font-semibold uppercase tracking-wider';
        }

        function submitFault() {
            const selectOptions = document.querySelector('select');
            const roomInput = document.querySelector('input[type="text"]').value;
            const description = document.querySelector('textarea').value;

            if (selectOptions.selectedIndex === 0 || !roomInput || !description.trim()) {
                alert('Please provide building, room details, and a description.');
                return;
            }

            const building = selectOptions.options[selectOptions.selectedIndex].text.match(/\(([^)]+)\)/)?.[1] || selectOptions.options[selectOptions.selectedIndex].text;

            const newFault = {
                title: `${building} ${roomInput}`,
                time: "Reported Just Now",
                status: "In Progress",
                icon: "construction",
                priority: currentPriority
            };

            const existingFaults = JSON.parse(localStorage.getItem('knot_faults')) || [
                { title: "Projector Room 1", time: "Reported 2h ago", status: "In Progress", icon: "potted_plant", priority: "Low" },
                { title: "HVAC Unit B4", time: "Fixed Yesterday", status: "Resolved", icon: "ac_unit", priority: "Medium" }
            ];

            existingFaults.unshift(newFault);
            localStorage.setItem('knot_faults', JSON.stringify(existingFaults));

            // Small delay to simulate processing
            const btn = document.querySelector('button[onclick="submitFault()"]');
            btn.innerHTML = 'Submitting...';
            btn.classList.add('opacity-75');

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 300);
        }
    </script>
</body>

</html>
